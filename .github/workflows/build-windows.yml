name: Build ScalaPodcaster VST3 (Windows)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Allows manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows VST3
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Cache JUCE (saves ~3 min on repeated runs) ──────────────────────
      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: ScalaPodcaster4/build/_deps
          key: juce-7.0.9-windows-v4-${{ runner.os }}

      # ── 3. Configure with CMake (MSVC) ─────────────────────────────────────
      - name: Configure CMake
        working-directory: ScalaPodcaster4
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -G "Visual Studio 17 2022" `
            -A x64

      # ── 4. Build VST3 ──────────────────────────────────────────────────────
      - name: Build VST3
        working-directory: ScalaPodcaster4
        run: |
          cmake --build build `
            --config Release `
            --target ScalaPodcaster_VST3 `
            --parallel 4

      # ── 5. Locate and verify output ────────────────────────────────────────
      - name: Verify output
        working-directory: ScalaPodcaster4
        run: |
          $vst3 = "build\ScalaPodcaster_artefacts\Release\VST3\ScalaPodcaster.vst3"
          if (Test-Path $vst3) {
            Write-Host "✅ VST3 bundle found:"
            Get-ChildItem -Recurse $vst3 | Format-Table Name, Length
          } else {
            Write-Error "❌ VST3 bundle not found!"
            exit 1
          }

      # ── 6. Package as ZIP ──────────────────────────────────────────────────
      - name: Package VST3
        working-directory: ScalaPodcaster4
        run: |
          $src = "build\ScalaPodcaster_artefacts\Release\VST3\ScalaPodcaster.vst3"
          $out = "..\ScalaPodcaster_Windows_x64.zip"

          # Write install instructions
          $readme = @"
          ScalaPodcaster – Podcast Mastering Plugin (v2.0)
          ==========================================
          Windows x64 VST3 Build

          SIGNAL CHAIN:
            Input → EQ/De-Esser → Compressor → LUFS Makeup → True-Peak Limiter → Output

          LOUDNESS TARGETS (selectable preset, or Custom for a free value):
            -14 LUFS  (Spotify / YouTube)
            -16 LUFS  (Apple Podcasts)
            -23 LUFS  (EBU R128 Broadcast)
            -24 LUFS  (ATSC A/85 US Broadcast)
            Custom    (free -36 to -6 LUFS slider)

          True-Peak Limiter ceiling: -1 dBTP, always active.
          Loudness normalisation is applied across the whole signal from the
          first sample onward (no untreated startup gap).

          INSTALLATION:
            1. Copy ScalaPodcaster.vst3 to your VST3 folder:
               C:\Program Files\Common Files\VST3\

            2. Rescan plugins in your DAW.

          DAW COMPATIBILITY:
            ✅ DaVinci Resolve  → Preferences > VST Plugin Folders
            ✅ Reaper           → Options > Preferences > Plug-ins > VST
            ✅ Bitwig Studio    → Settings > Plug-ins
            ✅ Cubase / Nuendo  → auto-scanned from VST3 system folder
            ✅ Ableton Live 11+ → Options > Preferences > Plug-Ins
            ✅ FL Studio        → Options > Manage Plugins > scan
            ✅ Studio One       → Options > Locations > VST3 Plug-Ins
            ✅ Audacity 3.2+    → Effect > Add / Remove Plug-ins (VST3)

          PARAMETERS:
            EQ Section:
              HPF Frequency   : 20–400 Hz   (removes rumble, default 80 Hz)
              Low Shelf Gain  : ±6 dB       (warmth at 200 Hz)
              Presence Gain   : ±6 dB       (clarity at 3.5 kHz)
              De-Esser Thresh : -60–0 dB    (tames sibilance at 7.5 kHz)
              De-Esser On/Off

            Compressor Section:
              Threshold       : -60–0 dB    (default -24 dB)
              Ratio           : 1–20:1      (default 4:1)
              Knee            : 0–12 dB     (soft knee, default 6 dB)
              Attack          : 0.1–200 ms  (default 10 ms)
              Release         : 10–2000 ms  (default 80 ms)
              Makeup Gain     : -12–+24 dB

            Loudness Section:
              Loudness Target : preset dropdown (see above) or Custom
              Custom Target   : -36 to -6 LUFS (only active when Custom selected)

            Output:
              Integrated LUFS meter with target line
              Momentary LUFS meter
              Gain Reduction meter
              True-Peak Limiter (-1 dBTP, always active)

              Bypass (global)
          "@
          $readme | Out-File -FilePath "INSTALL.txt" -Encoding UTF8

          Compress-Archive -Path $src, "INSTALL.txt" -DestinationPath $out -Force
          Write-Host "✅ Packaged: $out"

      # ── 7. Upload artifact ─────────────────────────────────────────────────
      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScalaPodcaster-Windows-VST3
          path: ScalaPodcaster_Windows_x64.zip
          retention-days: 30

      # ── 8. Create GitHub Release on version tags ───────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ScalaPodcaster_Windows_x64.zip
          generate_release_notes: true
